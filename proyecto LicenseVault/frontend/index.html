<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LicenseVault — Distribución Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="static/css/style.css">
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="brand">
    <span class="brand-icon">◈</span>
    <span class="brand-name">LicenseVault</span>
  </div>
  <ul class="nav-list">
    <li class="nav-item active" data-page="dashboard">
      <span class="nav-icon">▦</span> Dashboard
    </li>
    <li class="nav-item" data-page="productos">
      <span class="nav-icon">◻</span> Productos
    </li>
    <li class="nav-item" data-page="clientes">
      <span class="nav-icon">◈</span> Clientes
    </li>
    <li class="nav-item" data-page="ventas">
      <span class="nav-icon">◇</span> Ventas
    </li>
    <li class="nav-item" data-page="reportes">
      <span class="nav-icon">▲</span> Reportes
    </li>
  </ul>
  <div class="sidebar-footer">
    <span class="tag-mono">MongoDB · Python · Flask</span>
  </div>
</nav>

<!-- MAIN -->
<main class="main-content" id="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="topbar-title" id="topbarTitle">Dashboard</div>
    <div class="topbar-right">
      <span class="status-dot"></span>
      <span class="tag-mono">licencias_saas</span>
    </div>
  </header>

  <!-- PÁGINAS -->
  <div class="page active" id="page-dashboard"></div>
  <div class="page"        id="page-productos"></div>
  <div class="page"        id="page-clientes"></div>
  <div class="page"        id="page-ventas"></div>
  <div class="page"        id="page-reportes"></div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Formulario</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="static/js/api.js"></script>
<script src="static/js/dashboard.js"></script>
<script src="static/js/productos.js"></script>
<script src="static/js/clientes.js"></script>
<script src="static/js/ventas.js"></script>
<script src="static/js/reportes.js"></script>
<script src="static/js/app.js"></script>
</body>
</html>
